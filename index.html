<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon"
        href="https://static.vecteezy.com/system/resources/previews/011/480/184/non_2x/music-player-app-musical-note-icon-isolated-on-square-background-vector.jpg"
        type="image/x-icon">
</head>

<body>
    <div class="container">
        <h2>Login/Sign-up</h2>
        <div class="input">
            Email: <input required type="email" name="email" id="email" placeholder="Enter email"><br>
            Password:<input required type="password" name="password" id="password" placeholder="Enter password">
        </div>
        <div class="btn">
            <button type="submit" id="login" onclick="login()">Login</button>

            <br><button type="submit" id="signup" onclick="signup()">Sign-up</button>
        </div>
        <p>Sign-up if not have any account!</p>
    </div>

    <!-- <script type="module" src="firebase.js"></script> -->
    <script type="module" src="main.js"></script>
</body>

</html>
